{% extends "base.html" %}
{% block title %}Initial Setup{% endblock %}
{% block content %}
<h2>Initial Setup</h2>
<p>Please provide your details to help us calculate your daily caloric needs.</p>

<form method="POST" action="{{ url_for('initial_setup') }}" id="setupForm">
    <div>
        <label>Gender:</label>
        <input type="radio" name="gender" value="male" id="gender_male" required {% if form_data.gender == 'male' %}checked{% endif %}>
        <label for="gender_male">Male</label>
        <input type="radio" name="gender" value="female" id="gender_female" required {% if form_data.gender == 'female' %}checked{% endif %}>
        <label for="gender_female">Female</label>
    </div>

    <div>
        <label for="weight">Weight (kg):</label>
        <input type="number" name="weight" id="weight" step="0.1" required value="{{ form_data.weight or '' }}">
    </div>

    <div>
        <label for="height">Height (cm):</label>
        <input type="number" name="height" id="height" step="0.1" required value="{{ form_data.height or '' }}">
    </div>

    <div>
        <label for="age">Age:</label>
        <input type="number" name="age" id="age" required value="{{ form_data.age or '' }}">
    </div>

    <div>
        <input type="checkbox" name="known_bmr_checkbox" id="known_bmr_checkbox" onchange="toggleBmrInput()">
        <label for="known_bmr_checkbox">I know my BMR</label>
    </div>

    <div id="bmr_direct_input_div" style="display: none;">
        <label for="bmr_direct">BMR (calories/day):</label>
        <input type="number" name="bmr_direct" id="bmr_direct" step="0.1" value="{{ form_data.bmr_direct or '' }}">
    </div>

    <div id="activity_level_div">
        <label for="activity_level">Activity Level:</label>
        <select name="activity_level" id="activity_level">
            <option value="1.2" {% if form_data.activity_level == 1.2 %}selected{% endif %}>Sedentary (little or no exercise)</option>
            <option value="1.375" {% if form_data.activity_level == 1.375 %}selected{% endif %}>Lightly Active (light exercise/sports 1-3 days/week)</option>
            <option value="1.55" {% if form_data.activity_level == 1.55 %}selected{% endif %}>Moderately Active (moderate exercise/sports 3-5 days/week)</option>
            <option value="1.725" {% if form_data.activity_level == 1.725 %}selected{% endif %}>Very Active (hard exercise/sports 6-7 days a week)</option>
            <option value="1.9" {% if form_data.activity_level == 1.9 %}selected{% endif %}>Super Active (very hard exercise/physical job & exercise 2x/day)</option>
        </select>
    </div>

    <div>
        <button type="submit">Save Details</button>
    </div>
</form>

<script>
    function toggleBmrInput() {
        var checkbox = document.getElementById('known_bmr_checkbox');
        var bmrDirectInputDiv = document.getElementById('bmr_direct_input_div');
        var activityLevelDiv = document.getElementById('activity_level_div');
        var bmrDirectInput = document.getElementById('bmr_direct');
        var activityLevelSelect = document.getElementById('activity_level');

        if (checkbox.checked) {
            bmrDirectInputDiv.style.display = 'block';
            activityLevelDiv.style.display = 'none';
            bmrDirectInput.required = true;
            activityLevelSelect.required = false;
        } else {
            bmrDirectInputDiv.style.display = 'none';
            activityLevelDiv.style.display = 'block';
            bmrDirectInput.required = false;
            activityLevelSelect.required = true;
        }
    }
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        var checkbox = document.getElementById('known_bmr_checkbox');
        // If bmr_direct has a value, it means it was previously checked or pre-filled
        if (document.getElementById('bmr_direct').value) {
            checkbox.checked = true;
        }
        toggleBmrInput(); // Set initial state
    });
</script>
{% endblock %}
