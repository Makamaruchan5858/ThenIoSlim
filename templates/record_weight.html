{% extends "base.html" %}
{% block title %}Record Weight{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h2>Record Your Weight</h2>

            <form method="POST" action="{{ url_for('record_weight') }}">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" class="form-control" id="date" name="date"
                           value="{{ today_date.strftime('%Y-%m-%d') if today_date else (date_val if date_val else '') }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" class="form-control" id="weight" name="weight" step="0.1" min="0"
                           placeholder="Enter your weight in kg"
                           value="{{ weight_val if weight_val else (request.form.weight if request.form.weight else '') }}"
                           required>
                </div>

                <button type="submit" class="btn btn-primary">Save Weight</button>
            </form>
            <p class="mt-3">
                <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
